<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f0f2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e2e8;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="16" flood-color="#00000018" />
    </filter>
    <filter id="cardshadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000014" />
    </filter>
  </defs>

  <!-- Фон -->
  <rect width="1200" height="630" fill="url(#bgGrad)" />

  <!-- Декоративні кола -->
  <circle cx="80"   cy="90"  r="190" fill="#047857" opacity="0.05" />
  <circle cx="1120" cy="540" r="230" fill="#047857" opacity="0.05" />
  <circle cx="1090" cy="70"  r="120" fill="#0071e3" opacity="0.04" />

  <!-- Сітка -->
  <g stroke="#b0b0be" stroke-width="0.5" opacity="0.12">
    <line x1="0" y1="105" x2="1200" y2="105" />
    <line x1="0" y1="210" x2="1200" y2="210" />
    <line x1="0" y1="315" x2="1200" y2="315" />
    <line x1="0" y1="420" x2="1200" y2="420" />
    <line x1="0" y1="525" x2="1200" y2="525" />
    <line x1="240"  y1="0" x2="240"  y2="630" />
    <line x1="480"  y1="0" x2="480"  y2="630" />
    <line x1="720"  y1="0" x2="720"  y2="630" />
    <line x1="960"  y1="0" x2="960"  y2="630" />
  </g>

  <!-- ===== ЦЕНТРАЛЬНЕ КОЛО З ШЕСТЕРНЕЮ ===== -->
  <circle cx="600" cy="300" r="130" fill="#ffffff" filter="url(#shadow)" />
  <circle cx="600" cy="300" r="112" fill="#f0fdf4" />

  <!-- Велика шестерня (фон) -->
  <g transform="translate(600,300)">
    <!-- Зубці шестерні -->
    <g fill="#047857" opacity="0.12">
      <rect x="-12" y="-130" width="24" height="30" rx="4" />
      <rect x="-12" y="100" width="24" height="30" rx="4" />
      <rect x="100" y="-12" width="30" height="24" rx="4" />
      <rect x="-130" y="-12" width="30" height="24" rx="4" />
      <!-- Діагональні -->
      <rect x="58" y="-115" width="24" height="30" rx="4" transform="rotate(45)" />
      <rect x="-82" y="-115" width="24" height="30" rx="4" transform="rotate(-45)" />
      <rect x="58"  y="85"  width="24" height="30" rx="4" transform="rotate(135)" />
      <rect x="-82" y="85"  width="24" height="30" rx="4" transform="rotate(-135)" />
    </g>
    <!-- Внутрішнє кільце -->
    <circle cx="0" cy="0" r="72" fill="none" stroke="#047857" stroke-width="2" opacity="0.15" />
    <!-- Іконка інструменту — гайковий ключ -->
    <g fill="none" stroke="#047857" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
      <!-- Ключ -->
      <path d="M-10,-50 Q30,-65 38,-30 L10,0 L38,40 Q20,62 -5,55 Q-35,46 -38,18 Q-42,-12 -18,-28 Z" />
      <line x1="10" y1="0" x2="42" y2="40" />
      <!-- Зірка на кінці ключа -->
      <circle cx="-8" cy="-34" r="12" />
    </g>
  </g>

  <!-- ===== 4 КАРТКИ НАВКОЛО ===== -->

  <!-- Картка 1: Видалення (зліва зверху) -->
  <g filter="url(#cardshadow)">
    <rect x="130" y="160" width="190" height="88" rx="14" fill="#ffffff" />
  </g>
  <text x="158" y="196" font-family="'Arial', sans-serif" font-size="26" fill="#047857">🗑️</text>
  <text x="196" y="192" font-family="'Arial', sans-serif" font-size="14" font-weight="700" fill="#1a1a2e">Видалення</text>
  <text x="196" y="210" font-family="'Arial', sans-serif" font-size="12" fill="#6b7280">без залишків</text>
  <text x="196" y="228" font-family="'Arial', sans-serif" font-size="11" fill="#047857">Geek Uninstaller</text>

  <!-- Картка 2: Очищення (справа зверху) -->
  <g filter="url(#cardshadow)">
    <rect x="878" y="160" width="190" height="88" rx="14" fill="#ffffff" />
  </g>
  <text x="906" y="196" font-family="'Arial', sans-serif" font-size="26" fill="#047857">🧹</text>
  <text x="944" y="192" font-family="'Arial', sans-serif" font-size="14" font-weight="700" fill="#1a1a2e">Очищення</text>
  <text x="944" y="210" font-family="'Arial', sans-serif" font-size="12" fill="#6b7280">тимчасових файлів</text>
  <text x="944" y="228" font-family="'Arial', sans-serif" font-size="11" fill="#047857">Wise Disk Cleaner</text>

  <!-- Картка 3: Автозавантаження (зліва знизу) -->
  <g filter="url(#cardshadow)">
    <rect x="130" y="378" width="190" height="88" rx="14" fill="#ffffff" />
  </g>
  <text x="158" y="414" font-family="'Arial', sans-serif" font-size="26" fill="#047857">⚡</text>
  <text x="196" y="410" font-family="'Arial', sans-serif" font-size="14" font-weight="700" fill="#1a1a2e">Автозавантаження</text>
  <text x="196" y="428" font-family="'Arial', sans-serif" font-size="12" fill="#6b7280">прискорення старту</text>
  <text x="196" y="446" font-family="'Arial', sans-serif" font-size="11" fill="#047857">Диспетчер завдань</text>

  <!-- Картка 4: Моніторинг (справа знизу) -->
  <g filter="url(#cardshadow)">
    <rect x="878" y="378" width="190" height="88" rx="14" fill="#ffffff" />
  </g>
  <text x="906" y="414" font-family="'Arial', sans-serif" font-size="26" fill="#047857">📊</text>
  <text x="944" y="410" font-family="'Arial', sans-serif" font-size="14" font-weight="700" fill="#1a1a2e">Моніторинг</text>
  <text x="944" y="428" font-family="'Arial', sans-serif" font-size="12" fill="#6b7280">стан системи</text>
  <text x="944" y="446" font-family="'Arial', sans-serif" font-size="11" fill="#047857">CPU-Z · GPU-Z</text>

  <!-- Лінії від карток до центру (пунктир) -->
  <g stroke="#047857" stroke-width="1.5" stroke-dasharray="6 5" opacity="0.25" fill="none">
    <line x1="320" y1="204" x2="490" y2="270" />
    <line x1="878" y1="204" x2="710" y2="270" />
    <line x1="320" y1="422" x2="490" y2="340" />
    <line x1="878" y1="422" x2="710" y2="340" />
  </g>

  <!-- ===== ЗАГОЛОВОК ===== -->
  <text x="600" y="94" font-family="'Arial', sans-serif" font-size="34" font-weight="700" fill="#1a1a2e" text-anchor="middle">Як тримати Windows у порядку</text>
  <text x="600" y="132" font-family="'Arial', sans-serif" font-size="18" fill="#4b5563" text-anchor="middle">корисні утиліти для обслуговування</text>

  <!-- Розділювач -->
  <line x1="420" y1="150" x2="780" y2="150" stroke="#047857" stroke-width="2" opacity="0.3" />

  <!-- ===== НИЖНІЙ РЯД: Що НЕ робити ===== -->
  <g filter="url(#cardshadow)">
    <rect x="320" y="480" width="560" height="52" rx="12" fill="#fef2f2" />
  </g>
  <text x="600" y="497" font-family="'Arial', sans-serif" font-size="13" fill="#991b1b" text-anchor="middle" font-weight="700">⚠ Уникайте псевдооптимізаторів</text>
  <text x="600" y="518" font-family="'Arial', sans-serif" font-size="12" fill="#b91c1c" text-anchor="middle">Advanced SystemCare, PC Optimizer Pro та подібні — марні або шкідливі</text>

  <!-- Лого Floppy -->
  <text x="600" y="590" font-family="'Arial', sans-serif" font-size="15" fill="#9ca3af" text-anchor="middle">floppy.pp.ua · безкоштовний софт для Windows</text>
</svg>
