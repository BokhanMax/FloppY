<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f0f2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e2e8;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="16" flood-color="#00000018" />
    </filter>
    <filter id="cardshadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000014" />
    </filter>
  </defs>

  <!-- Фон -->
  <rect width="1200" height="630" fill="url(#bgGrad)" />

  <!-- Декоративні кола -->
  <circle cx="80"   cy="90"  r="190" fill="#047857" opacity="0.05" />
  <circle cx="1120" cy="540" r="230" fill="#047857" opacity="0.05" />
  <circle cx="1090" cy="70"  r="120" fill="#0071e3" opacity="0.04" />

  <!-- Сітка -->
  <g stroke="#b0b0be" stroke-width="0.5" opacity="0.12">
    <line x1="0" y1="105" x2="1200" y2="105" />
    <line x1="0" y1="210" x2="1200" y2="210" />
    <line x1="0" y1="315" x2="1200" y2="315" />
    <line x1="0" y1="420" x2="1200" y2="420" />
    <line x1="0" y1="525" x2="1200" y2="525" />
    <line x1="240"  y1="0" x2="240"  y2="630" />
    <line x1="480"  y1="0" x2="480"  y2="630" />
    <line x1="720"  y1="0" x2="720"  y2="630" />
    <line x1="960"  y1="0" x2="960"  y2="630" />
  </g>

  <!-- ===== ЛІВА КАРТКА: PORTABLE ===== -->
  <g filter="url(#shadow)">
    <rect x="100" y="195" width="430" height="310" rx="22" fill="#ffffff" />
  </g>
  <!-- Зелена шапка -->
  <rect x="100" y="195" width="430" height="72" rx="22" fill="#047857" />
  <rect x="100" y="235" width="430" height="32" fill="#047857" />
  <!-- Заголовок -->
  <text x="315" y="240" font-family="'Arial', sans-serif" font-size="26" font-weight="700" fill="#ffffff" text-anchor="middle">Portable</text>

  <!-- Іконка флешки -->
  <g transform="translate(148, 220)">
    <rect x="0" y="-18" width="28" height="36" rx="4" fill="#ffffff" opacity="0.25" />
    <rect x="8" y="-10" width="12" height="6" rx="2" fill="#ffffff" opacity="0.5" />
    <rect x="4" y="4" width="20" height="8" rx="2" fill="#ffffff" opacity="0.4" />
  </g>

  <!-- Плюси Portable -->
  <g font-family="'Arial', sans-serif" font-size="15" fill="#1a1a2e">
    <text x="134" y="300">✅  Не потрібен інсталятор</text>
    <text x="134" y="330">✅  Не торкається реєстру</text>
    <text x="134" y="360">✅  Запускається з флешки</text>
    <text x="134" y="390">✅  Видалення = видалити папку</text>
    <text x="134" y="420">✅  Ідеально для тестування</text>
  </g>
  <!-- Мінус -->
  <text x="134" y="460" font-family="'Arial', sans-serif" font-size="15" fill="#6b7280">⬜  Рідко оновлюється авто</text>
  <text x="134" y="488" font-family="'Arial', sans-serif" font-size="15" fill="#6b7280">⬜  Не інтегрується з системою</text>

  <!-- ===== ПРАВА КАРТКА: INSTALLED ===== -->
  <g filter="url(#shadow)">
    <rect x="668" y="195" width="430" height="310" rx="22" fill="#ffffff" />
  </g>
  <!-- Синя шапка -->
  <rect x="668" y="195" width="430" height="72" rx="22" fill="#1d4ed8" />
  <rect x="668" y="235" width="430" height="32" fill="#1d4ed8" />
  <!-- Заголовок -->
  <text x="883" y="240" font-family="'Arial', sans-serif" font-size="26" font-weight="700" fill="#ffffff" text-anchor="middle">Installed</text>

  <!-- Іконка Setup -->
  <g transform="translate(716, 215)">
    <rect x="0" y="-14" width="26" height="32" rx="4" fill="#ffffff" opacity="0.25" />
    <text x="13" y="9" font-family="'Arial', sans-serif" font-size="16" fill="#ffffff" text-anchor="middle" opacity="0.7">▶</text>
  </g>

  <!-- Плюси Installed -->
  <g font-family="'Arial', sans-serif" font-size="15" fill="#1a1a2e">
    <text x="702" y="300">✅  Інтеграція з системою</text>
    <text x="702" y="330">✅  Автоматичні оновлення</text>
    <text x="702" y="360">✅  Відкриває файли подвійним кліком</text>
    <text x="702" y="390">✅  Контекстне меню (архіватори тощо)</text>
    <text x="702" y="420">✅  Підтримка драйверів та служб</text>
  </g>
  <!-- Мінуси -->
  <text x="702" y="460" font-family="'Arial', sans-serif" font-size="15" fill="#6b7280">⬜  Залишає сліди в реєстрі</text>
  <text x="702" y="488" font-family="'Arial', sans-serif" font-size="15" fill="#6b7280">⬜  Потребує прав адміністратора</text>

  <!-- ===== РОЗДІЛЬНИК З VS ===== -->
  <circle cx="600" cy="350" r="38" fill="#ffffff" filter="url(#cardshadow)" />
  <text x="600" y="359" font-family="'Arial', sans-serif" font-size="22" font-weight="700" fill="#374151" text-anchor="middle">VS</text>

  <!-- ===== НИЖНЯ ПІДКАЗКА ===== -->
  <g filter="url(#cardshadow)">
    <rect x="240" y="530" width="720" height="48" rx="12" fill="#f0fdf4" />
  </g>
  <text x="600" y="549" font-family="'Arial', sans-serif" font-size="13" font-weight="700" fill="#047857" text-anchor="middle">Як обрати?</text>
  <text x="600" y="568" font-family="'Arial', sans-serif" font-size="13" fill="#374151" text-anchor="middle">Флешка / тест / чужий ПК → Portable    ·    Постійне використання / інтеграція → Installed</text>

  <!-- ===== ЗАГОЛОВОК ===== -->
  <text x="600" y="90" font-family="'Arial', sans-serif" font-size="36" font-weight="700" fill="#1a1a2e" text-anchor="middle">Portable vs Installed</text>
  <text x="600" y="130" font-family="'Arial', sans-serif" font-size="18" fill="#4b5563" text-anchor="middle">що краще і коли обирати</text>
  <line x1="380" y1="150" x2="820" y2="150" stroke="#047857" stroke-width="2" opacity="0.3" />

  <!-- Лого -->
  <text x="600" y="606" font-family="'Arial', sans-serif" font-size="14" fill="#9ca3af" text-anchor="middle">floppy.pp.ua · безкоштовний софт для Windows</text>
</svg>
