name: Node CI

on: push

jobs:
  buildAndTest:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v1
    - name: Use Node.js 20.x
      uses: actions/setup-node@v1
      with:
        node-version: 20.x
    - name: Install, build
      run: |
        npm install
        npm run build
      env:
        CI: true
